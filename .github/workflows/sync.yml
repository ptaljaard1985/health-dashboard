name: Sync Garmin & Update Dashboard

on:
  schedule:
    - cron: '0 */3 * * *'  # Every 3 hours UTC
  workflow_dispatch:  # Manual trigger from Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync Garmin data
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          GARMINTOKENS: ${{ secrets.GARMINTOKENS }}
        run: python garmin_notion_sync.py

      - name: Generate dashboard
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_dashboard.py

      - name: Copy dashboard to index.html
        run: cp dashboard.html index.html

      - name: Commit & push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add health.db dashboard.html index.html
          git diff --staged --quiet || git commit -m "Auto-sync: update health data and dashboard"
          git push

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -c "
          import os, requests
          token = os.environ['TELEGRAM_BOT_TOKEN']
          chat_id = os.environ['TELEGRAM_CHAT_ID']
          run_url = 'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          msg = '⚠️ <b>Sync workflow failed</b>\n\nThe Garmin sync or dashboard generation failed.\n\n<a href=\"' + run_url + '\">View workflow run</a>'
          requests.post(
              f'https://api.telegram.org/bot{token}/sendMessage',
              json={'chat_id': chat_id, 'text': msg, 'parse_mode': 'HTML'}
          )
          "
